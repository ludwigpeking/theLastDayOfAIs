<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Tree Designer</title>
<link rel="stylesheet" href="style.css">
<style>
html { font-size: 14px; }
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; background:#0a0c10; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; }
*{box-sizing:border-box;}

/* TOOLBAR */
#toolbar { height:46px; background:#0f1218; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; padding:0 14px; gap:6px; flex-shrink:0; }
.t-logo { font-size:13px; font-weight:700; letter-spacing:.08em; color:#fff; margin-right:4px; }
.t-sep { width:1px; height:22px; background:rgba(255,255,255,0.12); margin:0 4px; }
.t-btn { padding:5px 12px; background:transparent; border:1px solid rgba(255,255,255,0.18); color:#9ca3af; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; cursor:pointer; border-radius:3px; font-family:inherit; transition:all .1s; }
.t-btn:hover { border-color:rgba(255,255,255,0.45); color:#e0e0e0; }
.t-btn.active { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.5); color:#fff; }
.t-btn.danger { border-color:rgba(239,68,68,0.35); color:#ef4444; }
.t-btn.danger:hover { background:rgba(239,68,68,0.1); }
#mode-hint { margin-left:auto; font-size:11px; color:#3d4452; letter-spacing:.06em; }

/* LAYOUT */
#main-area { flex:1; display:flex; overflow:hidden; }
#grid-scroll { flex:1; overflow:auto; position:relative; cursor:default; }
#grid-scroll::-webkit-scrollbar { width:6px; height:6px; }
#grid-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }

/* GRID */
#grid-container { position:relative; user-select:none; }
#grid-bg { position:absolute; inset:0; }
.gc { position:absolute; border:1px dashed rgba(255,255,255,0.055); border-radius:3px; transition:background .1s; }
.gc.hl { background:rgba(100,200,100,0.1); border-color:rgba(100,200,100,0.4); }
.gc.drop-tgt { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.35); border-style:solid; }

/* COLUMN / ROW LABELS */
.col-lbl { position:absolute; font-size:11px; color:rgba(255,255,255,0.18); text-align:center; pointer-events:none; }
.row-lbl { position:absolute; font-size:11px; color:rgba(255,255,255,0.18); pointer-events:none; }

/* SVG ARROWS */
#arrow-svg { position:absolute; inset:0; overflow:visible; }

/* NODE LAYER */
#node-layer { position:absolute; inset:0; pointer-events:none; }

/* NODE CARDS */
.node-card { position:absolute; pointer-events:all; cursor:pointer; border-radius:5px; border:1.5px solid; overflow:hidden; user-select:none; display:flex; flex-direction:column; transition:box-shadow .1s; }
.node-card:hover { box-shadow:0 0 0 2px rgba(255,255,255,0.22); }
.node-card.selected  { box-shadow:0 0 0 2.5px #fff !important; }
.node-card.upstream  { box-shadow:0 0 0 2px #60a5fa !important; opacity:1; }
.node-card.downstream{ box-shadow:0 0 0 2px #34d399 !important; opacity:1; }
.node-card.dimmed    { opacity:.22; }
.node-card.conn-from { box-shadow:0 0 0 2.5px #00e676 !important; }
.node-card.dragging { opacity:.6; z-index:1000; cursor:grabbing; pointer-events:none; }
.nc-dom { padding:4px 7px 2px; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; flex-shrink:0; white-space:nowrap; overflow:hidden; }
.nc-lbl { padding:2px 7px 4px; font-size:12px; font-weight:700; line-height:1.3; flex:1; white-space:pre-line; overflow:hidden; }
.nc-cost { padding:0 7px 4px; font-size:10px; opacity:.5; flex-shrink:0; }

/* EDIT PANEL */
#edit-panel { width:360px; flex-shrink:0; background:#0f1218; border-left:1px solid rgba(255,255,255,0.09); display:flex; flex-direction:column; overflow:hidden; }
#ph { padding:13px 15px 10px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; display:flex; align-items:flex-start; gap:8px; }
#ph-title { font-size:14px; font-weight:700; color:#e0e0e0; flex:1; line-height:1.35; min-width:0; }
#ph-del { padding:4px 10px; font-size:11px; border:1px solid rgba(239,68,68,0.3); color:#ef4444; background:transparent; cursor:pointer; border-radius:3px; font-family:inherit; font-weight:700; letter-spacing:.05em; flex-shrink:0; }
#ph-del:hover { background:rgba(239,68,68,0.12); }
.ptabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; flex-wrap:wrap; }
.ptab { flex:1; padding:8px 3px; background:transparent; border:none; border-bottom:2px solid transparent; color:#4a5568; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; transition:all .12s; font-family:inherit; min-width:0; white-space:nowrap; }
.ptab:hover { color:#a0aab4; }
.ptab.active { color:#e0e0e0; border-bottom-color:#fff; }
#pb { flex:1; overflow-y:auto; padding:13px 15px; }
#pb::-webkit-scrollbar { width:3px; }
#pb::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); }

/* FORM ELEMENTS */
.fg { margin-bottom:12px; }
.fl { display:block; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#4a5568; margin-bottom:4px; }
.fi { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#e0e0e0; font-size:12px; padding:7px 10px; border-radius:3px; outline:none; resize:vertical; font-family:inherit; }
.fi:focus { border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.07); }
select.fi { cursor:pointer; resize:none; }
.efx-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; }
.efx { display:flex; flex-direction:column; gap:3px; }
.efx-lbl { font-size:11px; color:#4a5568; font-weight:700; letter-spacing:.07em; text-transform:uppercase; }
input[type=number].fi { -moz-appearance:textfield; }
input[type=number].fi::-webkit-outer-spin-button,
input[type=number].fi::-webkit-inner-spin-button { -webkit-appearance:none; }
.prereq-list { display:flex; flex-wrap:wrap; gap:5px; min-height:22px; }
.prereq-tag { font-size:11px; padding:2px 8px; border-radius:3px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:#9ca3af; }
.empty-state { padding:30px 20px; text-align:center; color:#2d3748; font-size:12px; line-height:1.7; }
.arr-info-block { margin-bottom:10px; }
.arr-lbl { font-size:11px; font-weight:700; letter-spacing:.08em; color:#4a5568; margin-bottom:3px; display:block; }
.arr-val { font-size:13px; color:#e0e0e0; }
.wp-row { display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:12px; color:#9ca3af; }
.wp-del { background:transparent; border:none; color:#ef4444; cursor:pointer; font-size:14px; line-height:1; padding:0 4px; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="t-logo">TECH TREE DESIGNER</span>
  <div class="t-sep"></div>
  <button class="t-btn active" id="btn-sel" onclick="setMode('select')">SELECT</button>
  <button class="t-btn" id="btn-conn" onclick="setMode('connect')">CONNECT</button>
  <button class="t-btn" id="btn-del" onclick="setMode('delete')">DELETE</button>
  <div class="t-sep"></div>
  <button class="t-btn" onclick="addNodeToGrid()">+ NODE</button>
  <div class="t-sep"></div>
  <button class="t-btn" onclick="reduceWeaving()" title="Barycenter heuristic — minimises arrow crossings by reordering nodes within each row">REDUCE WEAVING</button>
  <div class="t-sep"></div>
  <button class="t-btn" onclick="exportData()">EXPORT JSON</button>
  <button class="t-btn" onclick="importData()">IMPORT JSON</button>
  <button class="t-btn" onclick="copyTechTreeJS()">COPY JS</button>
  <span id="mode-hint">Select a node or cell</span>
</div>

<div id="main-area">
  <div id="grid-scroll">
    <div id="grid-container">
      <div id="grid-bg"></div>
      <svg id="arrow-svg"></svg>
      <div id="node-layer"></div>
    </div>
  </div>
  <div id="edit-panel">
    <div id="ph">
      <div id="ph-title">No selection</div>
      <button id="ph-del" style="display:none" onclick="deleteSelected()">DELETE</button>
    </div>
    <div class="ptabs" id="ptabs" style="display:none">
      <button class="ptab active" data-tab="info">INFO</button>
      <button class="ptab" data-tab="dem">DEMOCRACY</button>
      <button class="ptab" data-tab="auth">AUTH</button>
      <button class="ptab" data-tab="corp">CORP</button>
      <button class="ptab" data-tab="ns">NON-STATE</button>
    </div>
    <div id="pb"><div class="empty-state">Click a node to edit it.<br>Use CONNECT mode to draw arrows.<br>Double-click an empty cell to add a node.</div></div>
  </div>
</div>

<script type="module">
import { TECHS, TC_DOM_META, TC_PL, NEW_TIER, NEW_COL } from './techTree.js';
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const CW = 132, CH = 104, GAP = 8, PAD = 24;
const COLS = 12, ROWS = 30;
const GW = PAD*2 + COLS*(CW+GAP) - GAP;
const GH = PAD*2 + ROWS*(CH+GAP) - GAP;

// DOM_META derived from techTree.js TC_DOM_META
const DOM_META = Object.fromEntries(Object.entries(TC_DOM_META).map(([k,v])=>[k,{label:v.label,color:v.textDark}]));

const POLITIES = ['dem','auth','corp','ns'];
const PL = TC_PL;
const PC = {dem:'#4a9eff', auth:'#ef4444', corp:'#10b981', ns:'#ec4899'};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {
  nodes: [],
  arrows: [],        // {id, from, to, waypoints:[{x,y}]}
  mode: 'select',
  sel: null,         // {type:'node'|'arrow', id}
  connFrom: null,
  panelTab: 'info',
  nid: 3000,
  drag: null,        // see drag section
  wpDrag: null,      // {arrowId, wpIdx, orig}
};

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const cx  = col => PAD + col*(CW+GAP);
const cy  = row => PAD + row*(CH+GAP);
const ncx = n   => cx(n.col) + CW/2;
const nty = n   => cy(n.row);
const nby = n   => cy(n.row) + CH;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const makeId = () => 'n'+(++S.nid);
const arrId  = () => 'a'+(++S.nid);
const nodeById  = id => S.nodes.find(n=>n.id===id);
const arrowById = id => S.arrows.find(a=>a.id===id);

function toGrid(e) {
  const s = document.getElementById('grid-scroll');
  const r = s.getBoundingClientRect();
  return {x: e.clientX - r.left + s.scrollLeft, y: e.clientY - r.top + s.scrollTop};
}
function snapToCell(x, y) {
  const col = clamp(Math.round((x - PAD) / (CW+GAP)), 0, COLS-1);
  const row = clamp(Math.round((y - PAD) / (CH+GAP)), 0, ROWS-1);
  return {col, row};
}
// Walk the arrow graph to collect all upstream or downstream node ids
function getAncestors(id) {
  const visited = new Set();
  const queue = [id];
  while (queue.length) {
    const cur = queue.shift();
    S.arrows.forEach(a => {
      if (a.to === cur && !visited.has(a.from)) { visited.add(a.from); queue.push(a.from); }
    });
  }
  return visited;
}
function getDescendants(id) {
  const visited = new Set();
  const queue = [id];
  while (queue.length) {
    const cur = queue.shift();
    S.arrows.forEach(a => {
      if (a.from === cur && !visited.has(a.to)) { visited.add(a.to); queue.push(a.to); }
    });
  }
  return visited;
}

function isFree(col, row, exceptId=null) {
  return !S.nodes.some(n=>n.col===col && n.row===row && n.id!==exceptId);
}
function makeNode(col, row) {
  return {
    id: makeId(), col, row,
    label: 'New Node', domain:'found', cost:1, desc:'', tech:'', voice:'', prereqs:[],
    polities: {
      dem:  {access:'yes',    effects:{tech_buff:0,gdp_buff:0,mil_buff:0}},
      auth: {access:'yes',    effects:{tech_buff:0,gdp_buff:0,mil_buff:0}},
      corp: {access:'yes',    effects:{tech_buff:0,gdp_buff:0,mil_buff:0}},
      ns:   {access:'yes',    effects:{tech_buff:0,gdp_buff:0,mil_buff:0}},
    }
  };
}

// ═══════════════════════════════════════════════════════
// SEED DATA (from techTree_v2)
// ═══════════════════════════════════════════════════════;;



function convertRawNode(n) {
  const polities = {};
  POLITIES.forEach(p => {
    const acc = (n.access||{})[p];
    polities[p] = {
      access: acc === true ? 'yes' : acc === false ? 'no' : (acc || 'no'),
      effects: {
        tech_buff:  (((n.effects||{})[p])||{}).tech_buff  || 0,
        gdp_buff:   (((n.effects||{})[p])||{}).gdp_buff   || 0,
        mil_buff:   (((n.effects||{})[p])||{}).mil_buff   || 0,
      }
    };
  });
  return {
    id: n.id,
    col: n.col !== undefined ? n.col : (NEW_COL[n.id] ?? 0),
    row: n.tier !== undefined ? n.tier : (NEW_TIER[n.id] ?? 0),
    label: n.name || (n.label||'').replace(/\\n/g,'\n'),
    domain: n.domain||'found',
    cost: n.cost||0,
    desc: n.desc||'',
    tech: n.tech||'',
    voice: n.voice||'',
    prereqs: n.pre || n.prereqs || [],
    polities,
  };
}

function buildArrowsFromPrereqs(nodes) {
  const arrows = [];
  nodes.forEach(n => {
    (n.prereqs||[]).forEach(pid => {
      if (nodes.find(x=>x.id===pid)) {
        arrows.push({id: arrId(), from: pid, to: n.id, waypoints:[]});
      }
    });
  });
  return arrows;
}

// ═══════════════════════════════════════════════════════
// ARROW PATH
// ═══════════════════════════════════════════════════════
function arrowPath(a) {
  const src = nodeById(a.from), dst = nodeById(a.to);
  if (!src||!dst) return '';
  const sx=ncx(src), sy=nby(src), dx=ncx(dst), dy=nty(dst);
  if (a.waypoints.length===0) {
    if (Math.abs(sx-dx)<2) return `M${sx} ${sy} L${dx} ${dy}`;
    const my=(sy+dy)/2;
    return `M${sx} ${sy} L${sx} ${my} L${dx} ${my} L${dx} ${dy}`;
  }
  const pts=[{x:sx,y:sy},...a.waypoints,{x:dx,y:dy}];
  return 'M'+pts.map(p=>`${p.x} ${p.y}`).join(' L');
}

function autoControlPts(a) {
  const src=nodeById(a.from), dst=nodeById(a.to);
  if(!src||!dst) return [];
  const sx=ncx(src),sy=nby(src),dx=ncx(dst),dy=nty(dst);
  if(Math.abs(sx-dx)<2) return [];
  const my=(sy+dy)/2;
  return [{x:(sx+dx)/2, y:my}];
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderAll() { renderNodes(); renderArrows(); renderPanel(); }

function renderNodes() {
  const layer = document.getElementById('node-layer');
  const existMap = new Map();
  layer.querySelectorAll('.node-card').forEach(el=>existMap.set(el.dataset.id, el));
  const hasSelNode = S.sel?.type === 'node';
  const selAnc  = hasSelNode ? getAncestors(S.sel.id)   : null;
  const selDesc = hasSelNode ? getDescendants(S.sel.id) : null;
  const seen = new Set();

  for (const n of S.nodes) {
    seen.add(n.id);
    const dm = DOM_META[n.domain]||DOM_META.found;
    let el = existMap.get(n.id);
    if (!el) {
      el = document.createElement('div');
      el.className='node-card';
      el.dataset.id=n.id;
      el.style.width=CW+'px'; el.style.height=CH+'px';
      el.innerHTML='<div class="nc-dom"></div><div class="nc-lbl"></div><div class="nc-cost"></div>';
      el.addEventListener('mousedown', onNodeMD);
      layer.appendChild(el);
    }
    el.style.left=cx(n.col)+'px'; el.style.top=cy(n.row)+'px';
    el.style.borderColor=dm.color;
    el.style.background=dm.color+'18';
    el.querySelector('.nc-dom').textContent=dm.label;
    el.querySelector('.nc-dom').style.color=dm.color;
    el.querySelector('.nc-dom').style.background=dm.color+'28';
    el.querySelector('.nc-lbl').textContent=n.label;
    el.querySelector('.nc-cost').textContent='COST '+n.cost;
    const isSel = S.sel?.type==='node' && S.sel.id===n.id;
    el.classList.toggle('selected',   isSel);
    el.classList.toggle('upstream',   !isSel && selAnc?.has(n.id));
    el.classList.toggle('downstream', !isSel && selDesc?.has(n.id));
    el.classList.toggle('dimmed',     !isSel && hasSelNode && !selAnc?.has(n.id) && !selDesc?.has(n.id));
    el.classList.toggle('conn-from',  S.connFrom===n.id);
  }
  existMap.forEach((el,id)=>{ if(!seen.has(id)) el.remove(); });
}

function renderArrows() {
  const svg = document.getElementById('arrow-svg');
  // Clear, keep defs
  while(svg.lastChild) svg.removeChild(svg.lastChild);

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const mkMarker = (id, fill) => {
    const m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id',id); m.setAttribute('markerWidth','8'); m.setAttribute('markerHeight','6');
    m.setAttribute('refX','7'); m.setAttribute('refY','3'); m.setAttribute('orient','auto');
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','0 0, 8 3, 0 6'); p.setAttribute('fill',fill);
    m.appendChild(p); return m;
  };
  defs.appendChild(mkMarker('ah','#44505e'));
  defs.appendChild(mkMarker('ah-sel','#aaaaaa'));
  defs.appendChild(mkMarker('ah-up','#60a5fa'));
  defs.appendChild(mkMarker('ah-down','#34d399'));
  Object.entries(DOM_META).forEach(([k,v])=>{
    defs.appendChild(mkMarker('ah-'+k, v.color+'aa'));
  });
  svg.appendChild(defs);

  const hasSelNode = S.sel?.type === 'node';
  const selAnc  = hasSelNode ? getAncestors(S.sel.id)   : null;
  const selDesc = hasSelNode ? getDescendants(S.sel.id) : null;

  for (const a of S.arrows) {
    const src=nodeById(a.from), dst=nodeById(a.to);
    if(!src||!dst) continue;
    const isSel  = S.sel?.type==='arrow' && S.sel.id===a.id;
    const isUp   = hasSelNode && selAnc?.has(a.from)  && selAnc?.has(a.to);
    const isDown = hasSelNode && selDesc?.has(a.from) && selDesc?.has(a.to);
    // arrow directly into the selected node counts as upstream
    const isToSel   = hasSelNode && a.to   === S.sel.id;
    const isFromSel = hasSelNode && a.from === S.sel.id;
    const dimmed = hasSelNode && !isSel && !isUp && !isDown && !isToSel && !isFromSel;

    const dm = DOM_META[src.domain]||DOM_META.found;
    let col, mkId, sw;
    if (isSel)            { col='#aaaaaa';  mkId='ah-sel';  sw='2'; }
    else if (isToSel||isUp)  { col='#60a5facc'; mkId='ah-up';   sw='2'; }
    else if (isFromSel||isDown){ col='#34d399cc'; mkId='ah-down'; sw='2'; }
    else if (dimmed)      { col='rgba(255,255,255,0.08)'; mkId='ah'; sw='1'; }
    else                  { col=dm.color+'99'; mkId='ah-'+src.domain; sw='1.5'; }

    const d = arrowPath(a);

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');

    const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('d',d); hit.setAttribute('stroke','transparent');
    hit.setAttribute('stroke-width','14'); hit.setAttribute('fill','none');
    hit.style.pointerEvents='stroke'; hit.style.cursor='pointer';
    hit.addEventListener('click', e=>{e.stopPropagation(); onArrowClick(a.id);});

    const line=document.createElementNS('http://www.w3.org/2000/svg','path');
    line.setAttribute('d',d); line.setAttribute('stroke',col);
    line.setAttribute('stroke-width', isSel?'2':sw); line.setAttribute('fill','none');
    line.setAttribute('marker-end','url(#'+mkId+')');
    if(isSel) line.setAttribute('stroke-dasharray','6 3');

    g.appendChild(line); g.appendChild(hit); svg.appendChild(g);

    // Waypoint handles when selected
    if(isSel) {
      const ctrlPts = a.waypoints.length>0 ? a.waypoints.map((wp,i)=>({...wp,stored:true,idx:i})) : autoControlPts(a).map((wp,i)=>({...wp,stored:false,idx:i}));
      ctrlPts.forEach((pt,i) => {
        const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',pt.x); c.setAttribute('cy',pt.y); c.setAttribute('r','6');
        c.setAttribute('fill', pt.stored?'#fff':'rgba(255,255,255,0.5)');
        c.setAttribute('stroke','#222'); c.setAttribute('stroke-width','2');
        c.style.pointerEvents='all'; c.style.cursor='move';
        c.addEventListener('mousedown',e=>{e.stopPropagation(); onWpMD(e,a.id,i,pt);});
        svg.appendChild(c);
      });
    }
  }
}

// ═══════════════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════════════
function renderPanel() {
  const title=document.getElementById('ph-title');
  const del=document.getElementById('ph-del');
  const tabs=document.getElementById('ptabs');
  const pb=document.getElementById('pb');

  if (!S.sel) {
    title.textContent='No selection';
    del.style.display='none'; tabs.style.display='none';
    pb.innerHTML='<div class="empty-state">Click a node to edit it.<br>Use CONNECT mode to draw arrows.<br>Double-click an empty cell to add a node.</div>';
    return;

    pb.innerHTML=`
      <div class="arr-info-block"><span class="arr-lbl">FROM</span><div class="arr-val">${src?src.label.replace(/\n/g,' '):'?'}</div></div>
      <div class="arr-info-block"><span class="arr-lbl">TO</span><div class="arr-val">${dst?dst.label.replace(/\n/g,' '):'?'}</div></div>

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Update field helpers (live binding via oninput/onchange in rendered HTML)
function nf(key, val) {

  const n=nodeById(S.sel.id); if(!n) return;

  if(key==='label'||key==='domain'||key==='cost') renderNodes();

}
function pf(polity, stat, val) {

}
function pa(polity, val) {
  if(!S.sel||S.sel.type!=='node') return;
  const n=nodeById(S.sel.id); if(!n) return;

}

// ═══════════════════════════════════════════════════════
let _pendingClick = null;

function onNodeMD(e) {
  if(e.button!==0) return;
  e.stopPropagation();
  const id=e.currentTarget.dataset.id;
  const n=nodeById(id); if(!n) return;

  if(S.mode==='delete') { deleteNode(id); return; }
  if(S.mode==='connect') {
    if(!S.connFrom) { S.connFrom=id; renderNodes(); setMode('connect'); return; }
    if(S.connFrom!==id) {
      const exists=S.arrows.some(a=>a.from===S.connFrom&&a.to===id);
      if(!exists) {
        const arr={id:arrId(),from:S.connFrom,to:id,waypoints:[]};
        S.arrows.push(arr);
        // Keep prereqs in sync
        const dst=nodeById(id);
        if(dst&&!dst.prereqs.includes(S.connFrom)) dst.prereqs.push(S.connFrom);
      }
      S.connFrom=null; renderArrows(); renderNodes(); setMode('select');
    }
    return;
  }

  // Select mode — start potential drag
  const gpt=toGrid(e);
  S.drag={
    id, moved:false,
    startX:gpt.x, startY:gpt.y,
    offX: gpt.x - cx(n.col),
    offY: gpt.y - cy(n.row),
    origCol:n.col, origRow:n.row,
    curCol:n.col, curRow:n.row,
  };
  _pendingClick=id;
}

function onWpMD(e, arrowId, wpIdx, pt) {
  if(e.button!==0) return;
  e.stopPropagation();
  const a=arrowById(arrowId); if(!a) return;
  // If no stored waypoints yet, initialize from auto pts
  if(!pt.stored && a.waypoints.length===0) {
    const auto=autoControlPts(a);
    if(auto.length>0) a.waypoints.push(...auto.map(p=>({x:p.x,y:p.y})));
  }
  const gpt=toGrid(e);
  S.wpDrag={ arrowId, wpIdx: pt.stored ? pt.idx : 0, startX:gpt.x, startY:gpt.y };
}

function onGlobalMM(e) {
  // Node drag
  if(S.drag) {
    const gpt=toGrid(e);
    const dx=gpt.x-S.drag.startX, dy=gpt.y-S.drag.startY;
    if(!S.drag.moved && (Math.abs(dx)>5||Math.abs(dy)>5)) S.drag.moved=true;
    if(S.drag.moved) {
      const snap=snapToCell(gpt.x-S.drag.offX+CW/2, gpt.y-S.drag.offY+CH/2);
      S.drag.curCol=snap.col; S.drag.curRow=snap.row;
      // Move card visually (ghost)
      const el=document.querySelector(`.node-card[data-id="${S.drag.id}"]`);
      if(el) { el.classList.add('dragging'); el.style.left=(gpt.x-S.drag.offX)+'px'; el.style.top=(gpt.y-S.drag.offY)+'px'; }
      // Highlight target cell
      document.querySelectorAll('.gc.drop-tgt').forEach(c=>c.classList.remove('drop-tgt'));
      const tgt=document.querySelector(`.gc[data-col="${snap.col}"][data-row="${snap.row}"]`);
      if(tgt) tgt.classList.add('drop-tgt');
      renderArrows();
    }
    return;
  }
  // Waypoint drag
  if(S.wpDrag) {
    const gpt=toGrid(e);
    const a=arrowById(S.wpDrag.arrowId); if(!a) return;
    if(a.waypoints[S.wpDrag.wpIdx]) {
      a.waypoints[S.wpDrag.wpIdx]={x:gpt.x, y:gpt.y};
      renderArrows();
    }
  }
}

function onGlobalMU(e) {
  if(S.drag) {
    const id=S.drag.id;
    document.querySelectorAll('.gc.drop-tgt').forEach(c=>c.classList.remove('drop-tgt'));
    if(S.drag.moved) {
      const {curCol,curRow}=S.drag;
      if(isFree(curCol,curRow,id)) {
        const n=nodeById(id); if(n){n.col=curCol; n.row=curRow;}
      }
    } else {
      // It was a click
      S.sel={type:'node',id};
    }
    const el=document.querySelector(`.node-card[data-id="${id}"]`);
    if(el) el.classList.remove('dragging');
    S.drag=null; _pendingClick=null;
    renderAll();
  }
  if(S.wpDrag) { S.wpDrag=null; renderPanel(); }
}

function onArrowClick(id) {
  if(S.mode==='delete') { deleteArrow(id); return; }
  S.sel={type:'arrow',id}; renderArrows(); renderPanel();
}

function onGridClick(e) {
  if(S.drag||S.wpDrag) return;
  if(e.target.classList.contains('node-card')||e.target.closest('.node-card')) return;
  S.sel=null; S.connFrom=null; renderAll();
}

function onGridDblClick(e) {
  if(e.target.classList.contains('gc')) {
    const col=+e.target.dataset.col, row=+e.target.dataset.row;
    if(isFree(col,row)) {
      const n=makeNode(col,row);
      S.nodes.push(n);
      S.sel={type:'node',id:n.id};
      S.panelTab='info';
      renderAll();
    }
  }
}

function addNodeToGrid() {
  // Find first free cell scanning row by row
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(isFree(c,r)) {
      const n=makeNode(c,r);
      S.nodes.push(n);
      S.sel={type:'node',id:n.id}; S.panelTab='info';
      renderAll();
      // Scroll to it
      const gs=document.getElementById('grid-scroll');
      gs.scrollTo({left:cx(c)-80,top:cy(r)-80,behavior:'smooth'});
      return;
    }
  }
  alert('Grid is full!');
}

function deleteSelected() {
  if(!S.sel) return;
  if(S.sel.type==='node') deleteNode(S.sel.id);
  else if(S.sel.type==='arrow') deleteArrow(S.sel.id);
}

function deleteNode(id) {
  if(!confirm('Delete this node and all its connections?')) return;
  S.nodes=S.nodes.filter(n=>n.id!==id);
  S.arrows=S.arrows.filter(a=>a.from!==id&&a.to!==id);
  // Remove from prereqs
  S.nodes.forEach(n=>{ n.prereqs=n.prereqs.filter(p=>p!==id); });
  if(S.sel?.id===id) S.sel=null;
  renderAll();
}

function deleteArrow(id) {
  const a=arrowById(id); if(!a) return;
  S.arrows=S.arrows.filter(x=>x.id!==id);
  // Remove from prereqs
  const dst=nodeById(a.to);
  if(dst) dst.prereqs=dst.prereqs.filter(p=>p!==a.from);
  if(S.sel?.id===id) S.sel=null;
  renderAll();
}

function deleteWp(arrowId, idx) {
  const a=arrowById(arrowId); if(!a) return;
  a.waypoints.splice(idx,1);
  renderArrows(); renderPanel();
}

function addAutoWp() {
  if(!S.sel||S.sel.type!=='arrow') return;
  const a=arrowById(S.sel.id); if(!a) return;
  const src=nodeById(a.from), dst=nodeById(a.to); if(!src||!dst) return;
  const sx=ncx(src),sy=nby(src),dx=ncx(dst),dy=nty(dst);
  const my=(sy+dy)/2;
  const wx=Math.abs(sx-dx)<2?sx:(sx+dx)/2;
  a.waypoints.push({x:wx, y:my});
  renderArrows(); renderPanel();
}

// ═══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// WEAVING REDUCTION
// ═══════════════════════════════════════════════════════

// Column-order-reversal crossing test.
// For two downward arrows (s1→t1) and (s2→t2) we interpolate each arrow's
// column at the top and bottom of their overlapping row range. If the relative
// order reverses, the arrows cross — this is exact for any monotone routing
// (straight, elbow, or otherwise) and far more accurate than straight-line
// segment intersection for L-shaped paths.
function arrowsCross(s1, t1, s2, t2) {
  if (s1.id===s2.id || t1.id===t2.id) return false;
  const h1 = t1.row - s1.row, h2 = t2.row - s2.row;
  if (h1 <= 0 || h2 <= 0) return false;
  const rS = Math.max(s1.row, s2.row);
  const rE = Math.min(t1.row, t2.row);
  if (rS >= rE) return false;
  // Interpolated column of each arrow at rows rS and rE
  const c1s = s1.col + (rS - s1.row) / h1 * (t1.col - s1.col);
  const c2s = s2.col + (rS - s2.row) / h2 * (t2.col - s2.col);
  const c1e = s1.col + (rE - s1.row) / h1 * (t1.col - s1.col);
  const c2e = s2.col + (rE - s2.row) / h2 * (t2.col - s2.col);
  return (c1s - c2s) * (c1e - c2e) < 0;
}

// Cache valid (downward) arrows for repeated crossing checks.
let _validArrows = null;
function validArrows() {
  if (!_validArrows) {
    _validArrows = S.arrows.filter(a => {
      const s=nodeById(a.from), t=nodeById(a.to);
      return s && t && s.row < t.row;
    }).map(a => ({s: nodeById(a.from), t: nodeById(a.to)}));
  }
  return _validArrows;
}

function countCrossings() {
  const va = validArrows();
  let n = 0;
  for (let i = 0; i < va.length; i++)
    for (let j = i+1; j < va.length; j++)
      if (arrowsCross(va[i].s, va[i].t, va[j].s, va[j].t)) n++;
  return n;
}

// Count crossings where at least one arrow involves node nd.
function countCrossingsFor(nd) {
  const va = validArrows();
  const mine = va.filter(a => a.s.id===nd.id || a.t.id===nd.id);
  const others = va.filter(a => a.s.id!==nd.id && a.t.id!==nd.id);
  let n = 0;
  for (const m of mine)
    for (const o of [...mine, ...others])
      if (m !== o && arrowsCross(m.s, m.t, o.s, o.t)) n++;
  return n / 2; // each mine×mine pair counted twice
}

function snapCols()    { return S.nodes.map(n=>({id:n.id,col:n.col})); }
function restoreCols(snap) {
  snap.forEach(s=>{ const n=nodeById(s.id); if(n) n.col=s.col; });
  _validArrows = null; // positions changed — invalidate cache
}

// Place the sorted node list at column positions as close as possible to each
// node's barycenter value _b, while keeping them strictly ordered (no overlaps).
// Falls back to even spacing only when nodes don't fit otherwise.
function assignNearBarycenter(nodes) {
  const k = nodes.length;
  if (k <= 1) return;
  // Clamp raw targets
  const raw = nodes.map(n => clamp(Math.round(n._b), 0, COLS-1));
  // Forward pass: ensure strictly increasing
  for (let i = 1; i < k; i++)
    if (raw[i] <= raw[i-1]) raw[i] = raw[i-1] + 1;
  if (raw[k-1] >= COLS) {
    // Doesn't fit — fall back to even spacing
    nodes.forEach((n,i) => { n.col = Math.round(i*(COLS-1)/Math.max(k-1,1)); });
    return;
  }
  // Backward pass: pull left where there's slack
  for (let i = k-2; i >= 0; i--)
    if (raw[i] >= raw[i+1]) raw[i] = raw[i+1] - 1;
  nodes.forEach((n,i) => { n.col = raw[i]; });
  _validArrows = null;
}

// One full set of alternating top-down / bottom-up barycenter sweeps.
function barycenterSweeps(rowMap, sortedRows, parentsOf, childrenOf, passes) {
  for (let pass = 0; pass < passes; pass++) {
    const rows = pass%2===0 ? sortedRows : [...sortedRows].reverse();
    const up   = pass%2===0; // top-down uses parents; bottom-up uses children
    for (const row of rows) {
      const nodes = rowMap.get(row);
      if (!nodes || nodes.length <= 1) continue;
      nodes.forEach(nd => {
        const nbrs = (up ? parentsOf : childrenOf).get(nd.id) || [];
        const rel  = nbrs.filter(nb => up ? nb.row < nd.row : nb.row > nd.row);
        nd._b = rel.length ? rel.reduce((s,nb)=>s+nb.col,0)/rel.length : nd.col;
      });
      nodes.sort((a,b) => a._b !== b._b ? a._b - b._b : a.col - b.col);
      assignNearBarycenter(nodes);
    }
  }
}

// Local pairwise-swap refinement: swap columns of any two nodes in the same row
// if it strictly reduces total crossings; repeat until no improvement.
function localSwapRefine(rowMap) {
  let improved = true;
  let guard = 0;
  while (improved && guard++ < 30) {
    improved = false;
    for (const [, nodes] of rowMap) {
      for (let i = 0; i < nodes.length-1; i++) {
        for (let j = i+1; j < nodes.length; j++) {
          const before = countCrossings();
          // Try swap
          const tmp = nodes[i].col; nodes[i].col = nodes[j].col; nodes[j].col = tmp;
          _validArrows = null;
          if (countCrossings() < before) {
            improved = true; // keep swap
          } else {
            // Revert
            const tmp2 = nodes[i].col; nodes[i].col = nodes[j].col; nodes[j].col = tmp2;
            _validArrows = null;
          }
        }
      }
    }
  }
}

function reduceWeaving() {
  _validArrows = null;
  const before = countCrossings();

  // Build row groups and adjacency
  const rowMap    = new Map();
  const parentsOf  = new Map(S.nodes.map(n=>[n.id,[]]));
  const childrenOf = new Map(S.nodes.map(n=>[n.id,[]]));
  S.nodes.forEach(n => {
    if (!rowMap.has(n.row)) rowMap.set(n.row, []);
    rowMap.get(n.row).push(n);
  });
  S.arrows.forEach(a => {
    const src=nodeById(a.from), dst=nodeById(a.to);
    if (!src||!dst) return;
    parentsOf.get(dst.id).push(src);
    childrenOf.get(src.id).push(dst);
  });
  const sortedRows = [...rowMap.keys()].sort((a,b)=>a-b);

  let bestSnap  = snapCols();
  let bestScore = before;

  // --- Phase 1: multiple restarts of barycenter sweeps ----------------------
  // Restart 0: from current layout (no shuffle).
  // Restart 1-3: perturb best layout with a random within-row shuffle so the
  //   heuristic can escape local optima it reached in the previous restart.
  const NUM_RESTARTS = 4;
  const SWEEPS_PER_RESTART = 20;

  for (let r = 0; r < NUM_RESTARTS; r++) {
    if (r > 0) {
      restoreCols(bestSnap);
      // Shuffle columns within each row using Fisher-Yates
      for (const [, nodes] of rowMap) {
        const cols = nodes.map(n=>n.col);
        for (let i = cols.length-1; i > 0; i--) {
          const j = Math.floor(Math.random()*(i+1));
          [cols[i],cols[j]] = [cols[j],cols[i]];
        }
        nodes.forEach((n,i) => { n.col = cols[i]; });
        _validArrows = null;
      }
    }

    barycenterSweeps(rowMap, sortedRows, parentsOf, childrenOf, SWEEPS_PER_RESTART);

    const score = countCrossings();
    if (score < bestScore) { bestScore = score; bestSnap = snapCols(); }
    if (bestScore === 0) break;
  }

  // --- Phase 2: local swap refinement on the best layout found --------------
  restoreCols(bestSnap);
  localSwapRefine(rowMap);

  const afterSwap = countCrossings();
  if (afterSwap < bestScore) { bestScore = afterSwap; bestSnap = snapCols(); }
  else restoreCols(bestSnap);

  // Commit
  S.nodes.forEach(n => delete n._b);
  S.arrows.forEach(a => { a.waypoints = []; });
  _validArrows = null;
  renderAll();

  const saved = before - bestScore;
  showToast(
    saved > 0  ? `Crossings: ${before} → ${bestScore}  (−${saved})` :
    before===0 ? 'Already optimal — 0 crossings.' :
                 `No further improvement (${bestScore} crossings remain).`
  );
}

function showToast(msg) {
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    Object.assign(t.style,{
      position:'fixed',bottom:'22px',left:'50%',transform:'translateX(-50%)',
      background:'#1e2530',border:'1px solid rgba(255,255,255,0.18)',
      color:'#e0e0e0',fontSize:'12px',padding:'9px 20px',borderRadius:'4px',
      zIndex:'9999',pointerEvents:'none',transition:'opacity .3s',letterSpacing:'.04em',
    });
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>{ t.style.opacity='0'; },3500);
}

function exportData() {
  const out={
    nodes: S.nodes.map(n=>({
      id:n.id, col:n.col, row:n.row, label:n.label, domain:n.domain, cost:n.cost,
      desc:n.desc, tech:n.tech, voice:n.voice||'', prereqs:n.prereqs,
      access: Object.fromEntries(POLITIES.map(p=>[p,n.polities[p].access])),
      effects: Object.fromEntries(POLITIES.map(p=>[p,{...n.polities[p].effects}])),
    })),
    arrows: S.arrows.map(a=>({id:a.id,from:a.from,to:a.to,waypoints:a.waypoints})),
  };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='tech_tree.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(Array.isArray(d)) {
          // Raw NODES array format (from techTree_v2)
          S.nodes=d.map(n=>convertRawNode(n));
          S.arrows=buildArrowsFromPrereqs(S.nodes);
        } else if(d.nodes) {
          // Editor format
          S.nodes=d.nodes.map(n=>n.polities?n:convertRawNode(n));
          S.arrows=(d.arrows||[]);
        }
        S.sel=null; S.nextId=5000;
        renderAll();
      } catch(err) { alert('Invalid JSON: '+err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function copyTechTreeJS() {
  // Build TECHS array JS source from current editor state.
  // access: editor stores 'yes'/'no'/'partial' → convert back to true/false/'partial'
  const accToJS = v => v === 'yes' ? 'true' : v === 'no' ? 'false' : `'partial'`;

  const lines = [];
  lines.push('const TECHS = [');
  S.nodes.forEach((n, i) => {
    const isLast = i === S.nodes.length - 1;
    const pre = JSON.stringify(
      S.arrows.filter(a => a.to === n.id).map(a => a.from)
    );
    const accObj = POLITIES.map(p => `${p}:${accToJS(n.polities[p].access)}`).join(',');
    const efxObj = POLITIES.map(p => {
      const e = n.polities[p].effects;
      const vals = `tech_buff:${e.tech_buff||0},gdp_buff:${e.gdp_buff||0},mil_buff:${e.mil_buff||0}`;
      return `${p}:{${vals}}`;
    }).join(',');

    // escape strings for single-quoted JS
    const esc = s => (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');

    lines.push(`  {`);
    lines.push(`    id:'${esc(n.id)}', name:'${esc(n.label.replace(/\n/g,' '))}', domain:'${n.domain}', cost:${n.cost||0},`);
    lines.push(`    pre:${pre},`);
    lines.push(`    access:{${accObj}},`);
    lines.push(`    desc:'${esc(n.desc)}',`);
    lines.push(`    tech:'${esc(n.tech||'')}',`);
    lines.push(`    effects:{${efxObj}},`);
    lines.push(`    voice:'${esc(n.voice||'')}',`);
    lines.push(`  }${isLast ? '' : ','}`);
  });
  lines.push('];');

  // Also emit NEW_TIER and NEW_COL from current positions
  lines.push('');
  const tierEntries = S.nodes.map(n => `${n.id}:${n.row}`).join(',');
  const colEntries  = S.nodes.map(n => `${n.id}:${n.col}`).join(',');
  lines.push(`const NEW_TIER={${tierEntries}};`);
  lines.push(`const NEW_COL={${colEntries}};`);
  lines.push(`TECHS.forEach(n=>{ n.tier=(NEW_TIER[n.id]??0); n.col=(NEW_COL[n.id]??0); });`);

  const src = lines.join('\n');
  navigator.clipboard.writeText(src).then(() => {
    showToast(`Copied TECHS + NEW_TIER + NEW_COL (${S.nodes.length} nodes) to clipboard`);
  }).catch(() => {
    const w = window.open('', '_blank');
    w.document.write('<pre style="background:#111;color:#e0e0e0;padding:20px;font-family:monospace;font-size:12px;white-space:pre-wrap">' + src.replace(/</g,'&lt;') + '</pre>');
  });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init() {
  const container=document.getElementById('grid-container');
  container.style.width=GW+'px'; container.style.height=GH+'px';
  const svg=document.getElementById('arrow-svg');
  svg.setAttribute('width',GW); svg.setAttribute('height',GH);

  // Build grid background cells + labels
  const bg=document.getElementById('grid-bg');
  bg.style.width=GW+'px'; bg.style.height=GH+'px';
  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      const cell=document.createElement('div');
      cell.className='gc'; cell.dataset.col=c; cell.dataset.row=r;
      cell.style.left=cx(c)+'px'; cell.style.top=cy(r)+'px';
      cell.style.width=CW+'px'; cell.style.height=CH+'px';
      bg.appendChild(cell);
    }
    // Row label
    const rl=document.createElement('div');
    rl.className='row-lbl';
    rl.style.left=(cx(0)-20)+'px'; rl.style.top=(cy(r)+CH/2-7)+'px';
    rl.textContent=r;
    bg.appendChild(rl);
  }
  for(let c=0;c<COLS;c++) {
    const cl=document.createElement('div');
    cl.className='col-lbl';
    cl.style.left=cx(c)+'px'; cl.style.top=(cy(0)-18)+'px';
    cl.style.width=CW+'px';
    cl.textContent='col '+c;
    bg.appendChild(cl);
  }

  // Load seed data from techTree.js
  S.nodes=TECHS.map(convertRawNode);
  S.arrows=buildArrowsFromPrereqs(S.nodes);

  // Panel tabs
  document.querySelectorAll('.ptab').forEach(btn=>{
    btn.addEventListener('click',()=>{ S.panelTab=btn.dataset.tab; renderPanel(); });
  });

  // Global events
  document.addEventListener('mousemove', onGlobalMM);
  document.addEventListener('mouseup', onGlobalMU);
  document.getElementById('grid-container').addEventListener('click', onGridClick);
  document.getElementById('grid-container').addEventListener('dblclick', onGridDblClick);
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') { S.sel=null; S.connFrom=null; setMode('select'); renderAll(); }
    if(e.key==='Delete'&&S.sel) deleteSelected();
  });

  setMode('select');
  renderAll();
}

// Expose functions called from HTML onclick attributes (module scope doesn't reach them otherwise)
window.setMode        = setMode;
window.addNodeToGrid  = addNodeToGrid;
window.deleteSelected = deleteSelected;
window.reduceWeaving  = reduceWeaving;
window.exportData     = exportData;
window.importData     = importData;
window.copyTechTreeJS = copyTechTreeJS;

window.addEventListener('load', init);
</script>
