<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGI Tech Tree — Intelligence in Polities</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --bg2: #0f1218;
    --bg3: #161b24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #6b7280;
    --dim: #3d4452;

    --surv:   #ef4444;
    --econ:   #10b981;
    --mil:    #f59e0b;
    --gov:    #8b5cf6;
    --cult:   #ec4899;
    --found:  #64748b;

    --surv-d:   rgba(239,68,68,0.12);
    --econ-d:   rgba(16,185,129,0.12);
    --mil-d:    rgba(245,158,11,0.12);
    --gov-d:    rgba(139,92,246,0.12);
    --cult-d:   rgba(236,72,153,0.12);
    --found-d:  rgba(100,116,139,0.12);

    --locked: #1e2530;
    --locked-border: rgba(255,255,255,0.05);
    --researched: rgba(255,255,255,0.04);

    --panel-w: 340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: var(--text);
    white-space: nowrap;
  }
  .header-title span { color: var(--gov); }

  .polity-selector {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .polity-btn {
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .polity-btn:hover { border-color: var(--text); color: var(--text); }
  .polity-btn.active { color: #000; font-weight: 700; }
  .polity-btn[data-p="democracy"].active   { background: var(--gov);  border-color: var(--gov); }
  .polity-btn[data-p="authoritarian"].active { background: var(--surv); border-color: var(--surv); }
  .polity-btn[data-p="corporate"].active   { background: var(--econ); border-color: var(--econ); }
  .polity-btn[data-p="nonstate"].active    { background: var(--cult); border-color: var(--cult); }

  .research-pts {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .research-pts span { color: var(--gov); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── CANVAS ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.dragging { cursor: grabbing; }
  #tree-canvas {
    position: absolute;
    top: 0; left: 0;
  }

  /* ── SIDE PANEL ── */
  .side-panel {
    width: var(--panel-w);
    border-left: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-node-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .panel-domain-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 700;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
  }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .panel-section {
    margin-bottom: 18px;
  }
  .panel-section-title {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
  }
  .panel-desc {
    font-size: 11px;
    line-height: 1.7;
    color: #9ca3af;
    font-family: 'Space Mono', monospace;
  }

  .stat-effect-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .stat-effect-row:last-child { border-bottom: none; }
  .stat-name { color: var(--muted); }
  .stat-val { font-weight: 700; }
  .stat-val.pos { color: var(--econ); }
  .stat-val.neg { color: var(--surv); }
  .stat-val.neu { color: var(--muted); }

  .access-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .access-item {
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 10px;
    border: 1px solid;
  }
  .access-item.yes { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06); color: #10b981; }
  .access-item.no  { border-color: rgba(239,68,68,0.2);  background: rgba(239,68,68,0.04);  color: #ef4444; opacity: 0.6; }
  .access-item.partial { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); color: #f59e0b; }

  .prereq-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .prereq-chip {
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 10px;
    border: 1px solid var(--border2);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .prereq-chip.met   { border-color: rgba(16,185,129,0.4); color: #10b981; }
  .prereq-chip.unmet { border-color: rgba(239,68,68,0.3);  color: #6b7280; }
  .prereq-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .research-btn {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .research-btn.available {
    background: var(--gov-d);
    border-color: var(--gov);
    color: var(--gov);
  }
  .research-btn.available:hover {
    background: var(--gov);
    color: #000;
  }
  .research-btn.locked {
    background: transparent;
    border-color: var(--border);
    color: var(--dim);
    cursor: not-allowed;
  }
  .research-btn.researched {
    background: transparent;
    border-color: rgba(16,185,129,0.3);
    color: #10b981;
    cursor: default;
  }
  .research-btn.inaccessible {
    background: transparent;
    border-color: rgba(239,68,68,0.2);
    color: #ef4444;
    cursor: not-allowed;
    opacity: 0.6;
  }

  .no-selection {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--dim);
    text-align: center;
    padding: 32px;
    gap: 12px;
  }
  .no-selection-icon {
    font-size: 32px;
    opacity: 0.3;
  }
  .no-selection-text {
    font-size: 11px;
    line-height: 1.7;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    border-top: 1px solid var(--border);
    padding: 10px 18px;
    background: var(--bg);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .stat-block { display: flex; flex-direction: column; gap: 3px; min-width: 80px; }
  .stat-block-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .stat-block-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    width: 80px;
  }
  .stat-block-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .stat-block-val { font-size: 11px; font-weight: 700; color: var(--text); }

  /* ── TIER LABELS (drawn on canvas, but also overlay) ── */
  .tier-labels {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  .zoom-controls {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-btn {
    width: 28px; height: 28px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .zoom-btn:hover { background: var(--bg2); }

  .turn-display {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
  }
  .turn-display span { color: var(--mil); }
</style>
</head>
<body>

<header>
  <div class="header-title">AGI / <span>TECH TREE</span></div>
  <div class="polity-selector">
    <button class="polity-btn active" data-p="democracy">Democracy</button>
    <button class="polity-btn" data-p="authoritarian">Authoritarian</button>
    <button class="polity-btn" data-p="corporate">Corporate</button>
    <button class="polity-btn" data-p="nonstate">Non-State</button>
  </div>
  <div class="turn-display">Turn <span id="turn-num">1</span> / Short-Term</div>
  <div class="research-pts">Research Points: <span id="rp-display">12</span></div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--found)"></div>Foundation</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--surv)"></div>Surveillance</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--econ)"></div>Economic</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--mil)"></div>Military</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gov)"></div>Governance</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--cult)"></div>Cultural</div>
  <div style="margin-left:auto;display:flex;gap:14px;">
    <div class="legend-item"><div class="legend-dot" style="background:var(--econ);opacity:1"></div>Researched</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--text);opacity:0.4"></div>Available</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--dim);opacity:0.6"></div>Locked</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--surv);opacity:0.5"></div>Inaccessible</div>
  </div>
</div>

<div class="main">
  <div id="canvas-wrap">
    <canvas id="tree-canvas"></canvas>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>

      <button class="zoom-btn" id="zoom-reset" style="font-size:9px">FIT</button>

  </div>

  <div class="side-panel">
    <div id="panel-content">
      <div class="no-selection">
        <div class="no-selection-icon">◎</div>
        <div class="no-selection-text">Click any node to inspect<br>its capabilities, effects,<br>and polity access rules.</div>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
  </div>
</div>

      nonstate:     { capability: 0,  legitimacy: 0,  control: 0,  economic: 0,  military: 0  },
    },
    unlocks: ['silicon_governance'],
  },
  {
    id: 'recursive_self_improvement', label: 'Recursive Self-\nImprovement', domain: 'found', tier: 4, col: 7,
    cost: 8,
    desc: 'AGI that improves its own architecture autonomously. The Singularity Threshold. The last node before Silicon Governance. No polity has a meaningful strategy beyond this point — only trajectories.',
    prereqs: ['multimodal_agi','strategic_forecasting','asymmetric_warfare_agi'],
    access: { democracy: 'partial', authoritarian: 'partial', corporate: 'yes', nonstate: 'no' },
    effects: {
      democracy:    { capability: +8, legitimacy: -4, control: +3, economic: +5, military: +5 },
      authoritarian:{ capability: +8, legitimacy: 0,  control: +5, economic: +5, military: +6 },
      corporate:    { capability: +10,legitimacy: +1, control: +6, economic: +8, military: +5 },
      nonstate:     { capability: 0,  legitimacy: 0,  control: 0,  economic: 0,  military: 0  },
    },
    unlocks: ['silicon_governance'],
  },

  // ── TIER 5: SILICON GOVERNANCE ──
  {
    id: 'silicon_governance', label: 'SILICON\nGOVERNANCE', domain: 'gov', tier: 5, col: 3,
    cost: 10,
    desc: 'The final political transition. Carbon-based governance to Silicon-based governance. Concepts like "liberty", "sovereignty", and "ideology" rendered obsolete by Computational Efficiency. The endpoint your article predicts for all polity types — reached by different paths, at different speeds, with different levels of human agency remaining.',
    prereqs: ['recursive_self_improvement'],
    access: { democracy: 'partial', authoritarian: 'partial', corporate: 'yes', nonstate: 'no' },
    effects: {
      democracy:    { capability: +10, legitimacy: -5, control: +10, economic: +10, military: +10 },
      authoritarian:{ capability: +10, legitimacy: 0,  control: +10, economic: +10, military: +10 },
      corporate:    { capability: +12, legitimacy: +5, control: +10, economic: +12, military: +10 },
      nonstate:     { capability: 0,   legitimacy: 0,  control: 0,   economic: 0,   military: 0  },
    },
    unlocks: [],
  },
];

// Build lookup
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

// ═══════════════════════════════════════════════════════
//  POLITY STATE
// ═══════════════════════════════════════════════════════

const POLITY_INIT = {
  democracy:    { capability: 10, legitimacy: 18, control: 8,  economic: 12, military: 8,  rp: 12 },
  authoritarian:{ capability: 10, legitimacy: 5,  control: 16, economic: 10, military: 12, rp: 10 },
  corporate:    { capability: 14, legitimacy: 8,  control: 10, economic: 18, military: 6,  rp: 15 },
  nonstate:     { capability: 6,  legitimacy: 4,  control: 4,  economic: 4,  military: 6,  rp: 8  },
};

const STAT_COLORS = {
  capability: '#8b5cf6',
  legitimacy: '#10b981',
  control:    '#ef4444',
  economic:   '#f59e0b',
  military:   '#64748b',
};

const polityState = {};
POLITIES.forEach(p => {
  polityState[p] = {
    stats: { ...POLITY_INIT[p] },
    researched: new Set(),
  };
  polityState[p].rp = POLITY_INIT[p].rp;
  delete polityState[p].stats.rp;
});

// ═══════════════════════════════════════════════════════
//  LAYOUT ENGINE
// ═══════════════════════════════════════════════════════

const TIER_Y_SPACING = 130;
const COL_X_SPACING  = 110;
const NODE_W = 96;
const NODE_H = 52;
const TIER_LABEL_X = 18;
const CANVAS_PAD_X = 80;
const CANVAS_PAD_Y = 60;

const TIER_LABELS = [
  { tier: 0, label: 'Foundation' },
  { tier: 1, label: 'Narrow AI' },
  { tier: 2, label: 'Applied AGI' },
  { tier: 3, label: 'Advanced AGI' },
  { tier: 4, label: 'AGI' },
  { tier: 5, label: 'Silicon Governance' },
];

// Group nodes by tier, compute unique columns per tier
const tierGroups = {};
NODES.forEach(n => {
  if (!tierGroups[n.tier]) tierGroups[n.tier] = [];
  tierGroups[n.tier].push(n);
});

// Find max col in each tier for canvas sizing
const maxCol = Math.max(...NODES.map(n => n.col));
const maxTier = Math.max(...NODES.map(n => n.tier));

const CANVAS_W = CANVAS_PAD_X * 2 + (maxCol + 1) * COL_X_SPACING + NODE_W;
const CANVAS_H = CANVAS_PAD_Y * 2 + (maxTier + 1) * TIER_Y_SPACING + NODE_H;

function nodeX(n) { return CANVAS_PAD_X + n.col * COL_X_SPACING; }
function nodeY(n) { return CANVAS_PAD_Y + n.tier * TIER_Y_SPACING; }
function nodeCX(n) { return nodeX(n) + NODE_W / 2; }
function nodeCY(n) { return nodeY(n) + NODE_H / 2; }

// ═══════════════════════════════════════════════════════
//  CANVAS RENDERER
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('tree-canvas');
const ctx = canvas.getContext('2d');
canvas.width  = CANVAS_W;
canvas.height = CANVAS_H;

let currentPolity = 'democracy';
let selectedNode  = null;
let transform = { x: 0, y: 0, scale: 1 };

function nodeStatus(node, polity) {
  const st = polityState[polity];
  if (node.access[polity] === 'no') return 'inaccessible';
  if (st.researched.has(node.id)) return 'researched';
  // Check prereqs
  const prereqsMet = node.prereqs.every(pid => st.researched.has(pid));
  if (!prereqsMet) return 'locked';
  return 'available';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Background
  ctx.fillStyle = '#0a0c10';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Tier backgrounds
  TIER_LABELS.forEach(tl => {
    const y = nodeY({ tier: tl.tier, col: 0 }) - 24;
    const h = TIER_Y_SPACING;
    ctx.fillStyle = tl.tier % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.008)';
    ctx.fillRect(0, y, CANVAS_W, h);

    // Tier label
    ctx.font = '700 10px "Space Mono", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.textAlign = 'left';
    ctx.fillText(tl.label.toUpperCase(), TIER_LABEL_X, y + 16);
  });

  // Draw edges first
  NODES.forEach(node => {
    node.prereqs.forEach(pid => {
      const parent = nodeMap[pid];
      if (!parent) return;
      const parentStatus = nodeStatus(parent, currentPolity);
      const childStatus  = nodeStatus(node,   currentPolity);

      let edgeAlpha = 0.18;
      let edgeColor = '255,255,255';
      if (parentStatus === 'researched' && childStatus === 'researched') {
        edgeColor = hexToRgb(DOMAINS[node.domain].color);
        edgeAlpha = 0.7;
      } else if (parentStatus === 'researched' && childStatus === 'available') {
        edgeColor = hexToRgb(DOMAINS[node.domain].color);
        edgeAlpha = 0.35;
      } else if (childStatus === 'inaccessible') {
        edgeAlpha = 0.06;
      }

      const x1 = nodeCX(parent), y1 = nodeY(parent) + NODE_H;
      const x2 = nodeCX(node),   y2 = nodeY(node);
      const midY = (y1 + y2) / 2;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.bezierCurveTo(x1, midY, x2, midY, x2, y2);
      ctx.strokeStyle = `rgba(${edgeColor},${edgeAlpha})`;
      ctx.lineWidth = parentStatus === 'researched' ? 1.5 : 0.75;
      ctx.stroke();

      // Arrow tip
      if (edgeAlpha > 0.1) {
        const angle = Math.atan2(y2 - midY, x2 - x1);
        ctx.save();
        ctx.translate(x2, y2);
        ctx.rotate(angle + Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-3.5, 8);
        ctx.lineTo(3.5, 8);
        ctx.closePath();
        ctx.fillStyle = `rgba(${edgeColor},${edgeAlpha})`;
        ctx.fill();
        ctx.restore();
      }
    });
  });

  // Draw nodes
  NODES.forEach(node => {
    const status = nodeStatus(node, currentPolity);
    const domain = DOMAINS[node.domain];
    const x = nodeX(node), y = nodeY(node);
    const isSelected = selectedNode && selectedNode.id === node.id;

    // Node fill
    let fillColor, strokeColor, strokeWidth, textColor, alpha;
    if (status === 'researched') {
      fillColor   = `rgba(${hexToRgb(domain.color)},0.20)`;
      strokeColor = domain.color;
      strokeWidth = isSelected ? 2.5 : 1.5;
      textColor   = domain.color;
      alpha = 1;
    } else if (status === 'available') {
      fillColor   = 'rgba(255,255,255,0.04)';
      strokeColor = isSelected ? '#e8eaf0' : 'rgba(255,255,255,0.25)';
      strokeWidth = isSelected ? 2 : 1;
      textColor   = '#c9ccd4';
      alpha = 1;
    } else if (status === 'locked') {
      fillColor   = 'rgba(255,255,255,0.02)';
      strokeColor = 'rgba(255,255,255,0.07)';
      strokeWidth = 0.75;
      textColor   = '#3d4452';
      alpha = 1;
    } else { // inaccessible
      fillColor   = 'rgba(239,68,68,0.04)';
      strokeColor = 'rgba(239,68,68,0.15)';
      strokeWidth = 0.75;
      textColor   = '#4a2a2a';
      alpha = 0.7;
    }

    ctx.save();
    ctx.globalAlpha = alpha;

    // Selection glow
    if (isSelected) {
      ctx.shadowColor = status === 'researched' ? domain.color : '#e8eaf0';
      ctx.shadowBlur = 14;
    }

    // Rect
    ctx.beginPath();
    roundRect(ctx, x, y, NODE_W, NODE_H, 6);
    ctx.fillStyle = fillColor;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeWidth;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Domain accent line
    if (status === 'researched' || status === 'available') {
      ctx.beginPath();
      ctx.moveTo(x + 6, y);
      ctx.lineTo(x + NODE_W - 6, y);
      ctx.strokeStyle = status === 'researched' ? domain.color : `rgba(${hexToRgb(domain.color)},0.35)`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Tier 5 special — glow the whole node
    if (node.tier === 5 && status === 'available') {
      ctx.beginPath();
      roundRect(ctx, x-2, y-2, NODE_W+4, NODE_H+4, 8);
      ctx.strokeStyle = `rgba(${hexToRgb(domain.color)},0.2)`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // Text
    const lines = node.label.split('\n');
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    if (lines.length === 1) {
      ctx.font = '600 10px "Space Mono", monospace';
      ctx.fillText(lines[0], x + NODE_W/2, y + NODE_H/2 + 4);
    } else {
      ctx.font = '700 9.5px "Space Mono", monospace';
      ctx.fillText(lines[0], x + NODE_W/2, y + NODE_H/2 - 5);
      ctx.font = '400 9px "Space Mono", monospace';
      ctx.fillStyle = status === 'researched' ? `rgba(${hexToRgb(domain.color)},0.75)` : (status === 'available' ? 'rgba(200,204,212,0.6)' : textColor);
      ctx.fillText(lines[1], x + NODE_W/2, y + NODE_H/2 + 8);
    }

    // Researched checkmark
    if (status === 'researched') {
      ctx.font = '9px monospace';
      ctx.fillStyle = domain.color;
      ctx.textAlign = 'right';
      ctx.fillText('✓', x + NODE_W - 5, y + 12);
    }

    // Cost badge
    if (status === 'available' || status === 'locked') {
      ctx.font = '8px "Space Mono"';
      ctx.fillStyle = status === 'available' ? 'rgba(139,92,246,0.8)' : 'rgba(255,255,255,0.12)';
      ctx.textAlign = 'right';
      ctx.fillText(`${node.cost}rp`, x + NODE_W - 4, y + NODE_H - 4);
    }

    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════
//  PAN / ZOOM
// ═══════════════════════════════════════════════════════

const wrap = document.getElementById('canvas-wrap');

function applyTransform() {
  canvas.style.transform = `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
  canvas.style.transformOrigin = '0 0';
}

function fitToView() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const scaleX = ww / CANVAS_W;
  const scaleY = wh / CANVAS_H;
  transform.scale = Math.min(scaleX, scaleY, 1) * 0.92;
  transform.x = (ww - CANVAS_W * transform.scale) / 2;
  transform.y = (wh - CANVAS_H * transform.scale) / 2;
  applyTransform();
}

let dragging = false, dragStart = {x:0,y:0}, transformStart = {x:0,y:0};

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true;
  dragStart = {x: e.clientX, y: e.clientY};
  transformStart = {x: transform.x, y: transform.y};
  wrap.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  transform.x = transformStart.x + (e.clientX - dragStart.x);
  transform.y = transformStart.y + (e.clientY - dragStart.y);
  applyTransform();
});

window.addEventListener('mouseup', e => {
  dragging = false;
  wrap.classList.remove('dragging');
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(Math.max(transform.scale * delta, 0.25), 2.5);
  transform.x = mx - (mx - transform.x) * (newScale / transform.scale);
  transform.y = my - (my - transform.y) * (newScale / transform.scale);
  transform.scale = newScale;
  applyTransform();
}, { passive: false });

document.getElementById('zoom-in').onclick  = () => { transform.scale = Math.min(transform.scale * 1.2, 2.5); applyTransform(); };
document.getElementById('zoom-out').onclick = () => { transform.scale = Math.max(transform.scale * 0.8, 0.25); applyTransform(); };
document.getElementById('zoom-reset').onclick = fitToView;

// ═══════════════════════════════════════════════════════
//  CLICK DETECTION
// ═══════════════════════════════════════════════════════

wrap.addEventListener('click', e => {
  if (Math.abs(e.clientX - dragStart.x) > 5 || Math.abs(e.clientY - dragStart.y) > 5) return;
  const rect = wrap.getBoundingClientRect();
  const cx = (e.clientX - rect.left - transform.x) / transform.scale;
  const cy = (e.clientY - rect.top  - transform.y) / transform.scale;

  let hit = null;
  NODES.forEach(n => {
    const x = nodeX(n), y = nodeY(n);
    if (cx >= x && cx <= x + NODE_W && cy >= y && cy <= y + NODE_H) hit = n;
  });

  selectedNode = hit;
  draw();
  renderPanel();
});

// ═══════════════════════════════════════════════════════
//  PANEL RENDERER
// ═══════════════════════════════════════════════════════

function renderPanel() {
  const panel = document.getElementById('panel-content');
  if (!selectedNode) {
    panel.innerHTML = `<div class="no-selection">
      <div class="no-selection-icon">◎</div>
      <div class="no-selection-text">Click any node to inspect<br>its capabilities, effects,<br>and polity access rules.</div>
    </div>`;
    return;
  }

  const node = selectedNode;
  const domain = DOMAINS[node.domain];
  const status = nodeStatus(node, currentPolity);
  const st = polityState[currentPolity];

  let btnClass, btnLabel;
  if (status === 'researched')     { btnClass = 'researched';   btnLabel = '✓ Already Researched'; }
  else if (status === 'inaccessible') { btnClass = 'inaccessible'; btnLabel = '✕ Inaccessible to ' + POLITY_LABELS[currentPolity]; }
  else if (status === 'locked')    { btnClass = 'locked';       btnLabel = `⌛ Locked — ${node.prereqs.length} prerequisites needed`; }
  else if (st.rp < node.cost)      { btnClass = 'locked';       btnLabel = `Insufficient RP (need ${node.cost}, have ${st.rp})`; }
  else                             { btnClass = 'available';    btnLabel = `Research (${node.cost} RP)`; }

  // Effects for current polity
  const fx = node.effects[currentPolity];
  const fxRows = Object.entries(fx).filter(([k]) => k !== 'rp').map(([k,v]) => {
    if (v === 0) return `<div class="stat-effect-row"><span class="stat-name">${k}</span><span class="stat-val neu">—</span></div>`;
    const cls = v > 0 ? 'pos' : 'neg';
    return `<div class="stat-effect-row"><span class="stat-name">${k}</span><span class="stat-val ${cls}">${v > 0 ? '+' : ''}${v}</span></div>`;
  }).join('');

  // Access across polities
  const accessItems = POLITIES.map(p => {
    const a = node.access[p];
    const cls = a === 'yes' ? 'yes' : a === 'partial' ? 'partial' : 'no';
    const symbol = a === 'yes' ? '✓' : a === 'partial' ? '~' : '✕';
    return `<div class="access-item ${cls}">${symbol} ${POLITY_LABELS[p]}</div>`;
  }).join('');

  // Prerequisites
  const prereqItems = node.prereqs.length === 0
    ? '<div style="font-size:11px;color:var(--muted);">No prerequisites — starting node</div>'
    : node.prereqs.map(pid => {
        const pn = nodeMap[pid];
        const met = st.researched.has(pid);
        return `<div class="prereq-chip ${met ? 'met' : 'unmet'}">
          <div class="prereq-dot" style="background:${met ? '#10b981' : '#6b7280'}"></div>
          ${pn ? pn.label.replace('\n',' ') : pid}
        </div>`;
      }).join('');

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-node-name">${node.label.replace('\n',' ')}</div>
      <span class="panel-domain-tag" style="background:${domain.bg};color:${domain.color};border:1px solid ${domain.color}33">${domain.label}</span>
      &nbsp;<span style="font-size:9px;color:var(--muted);letter-spacing:0.06em">TIER ${node.tier} · ${node.cost}RP</span>
    </div>
    <div class="panel-body">
      <div class="panel-section">
        <div class="panel-desc">${node.desc}</div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">Stat Effects — ${POLITY_LABELS[currentPolity]}</div>
        ${fxRows}
      </div>

      <div class="panel-section">
        <div class="panel-section-title">Polity Access</div>
        <div class="access-grid">${accessItems}</div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">Prerequisites</div>
        <div class="prereq-list">${prereqItems}</div>
      </div>

      <button class="research-btn ${btnClass}" onclick="doResearch('${node.id}')">${btnLabel}</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  STATS BAR
// ═══════════════════════════════════════════════════════

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const st = polityState[currentPolity].stats;
  const rp = polityState[currentPolity].rp;

  const statDefs = [
    { key: 'capability', label: 'Capability',  max: 60, color: STAT_COLORS.capability },
    { key: 'legitimacy', label: 'Legitimacy',  max: 60, color: STAT_COLORS.legitimacy },
    { key: 'control',    label: 'Control',     max: 60, color: STAT_COLORS.control    },
    { key: 'economic',   label: 'Economic',    max: 60, color: STAT_COLORS.economic   },
    { key: 'military',   label: 'Military',    max: 60, color: STAT_COLORS.military   },
  ];

  bar.innerHTML = statDefs.map(s => {
    const val = Math.max(0, st[s.key]);
    const pct = Math.min(100, (val / s.max) * 100);
    return `<div class="stat-block">
      <div class="stat-block-label">${s.label}</div>
      <div class="stat-block-bar"><div class="stat-block-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <div class="stat-block-val" style="color:${s.color}">${val}</div>
    </div>`;
  }).join('') + `<div class="stat-block" style="margin-left:auto">
    <div class="stat-block-label">Res. Points</div>
    <div class="stat-block-bar"><div class="stat-block-fill" style="width:${Math.min(100,(rp/20)*100)}%;background:var(--gov)"></div></div>
    <div class="stat-block-val" style="color:var(--gov)">${rp}</div>
  </div>`;
  document.getElementById('rp-display').textContent = rp;
}

// ═══════════════════════════════════════════════════════
//  RESEARCH ACTION
// ═══════════════════════════════════════════════════════

function doResearch(nodeId) {
  const node = nodeMap[nodeId];
  const st   = polityState[currentPolity];
  const status = nodeStatus(node, currentPolity);
  if (status !== 'available') return;
  if (st.rp < node.cost) return;

  st.rp -= node.cost;
  st.researched.add(nodeId);

  const fx = node.effects[currentPolity];
  Object.entries(fx).forEach(([k, v]) => {
    if (st.stats[k] !== undefined) st.stats[k] += v;
  });

  draw();
  renderPanel();
  renderStats();
}

// ═══════════════════════════════════════════════════════
//  POLITY SWITCHER
// ═══════════════════════════════════════════════════════

document.querySelectorAll('.polity-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPolity = btn.dataset.p;
    document.querySelectorAll('.polity-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedNode = null;
    draw();
    renderPanel();
    renderStats();
    document.getElementById('rp-display').textContent = polityState[currentPolity].rp;
  });
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════

// Pre-research ml_basics for all polities as a starting condition
POLITIES.forEach(p => {
  const st = polityState[p];
  const node = nodeMap['ml_basics'];
  st.researched.add('ml_basics');
  const fx = node.effects[p];
  Object.entries(fx).forEach(([k,v]) => { if (st.stats[k] !== undefined) st.stats[k] += v; });
});

window.doResearch = doResearch;

window.addEventListener('load', () => {
  fitToView();
  draw();
  renderPanel();
  renderStats();
});

window.addEventListener('resize', () => {
  fitToView();
});
</script>
</body>
