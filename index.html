<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Earth with Country Shapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        #globe-container {
            width: 100vw;
            height: 100vh;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
        }
        
        .info-panel h1 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #4a9eff;
        }
        
        .info-panel p {
            font-size: 13px;
            line-height: 1.5;
            color: #ccc;
        }
        
        .country-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border: 1px solid rgba(74, 158, 255, 0.5);
        }
        
        .country-info.visible {
            opacity: 1;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            text-align: center;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(74, 158, 255, 0.3);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>
    
    <div class="info-panel">
        <h1>🌍 3D Earth</h1>
        <p>Real country shapes from GeoJSON data.<br>
        • Drag to rotate<br>
        • Scroll to zoom<br>
        • Hover to highlight countries</p>
    </div>
    
    <div id="country-info" class="country-info"></div>
    
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        Loading countries...
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <div id="debug-coords" style="position:fixed;bottom:16px;left:16px;font-family:monospace;font-size:13px;color:#0f0;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:4px;pointer-events:none;"></div>
    <script type="module" src="main.js"></script>
</body>
</html>
