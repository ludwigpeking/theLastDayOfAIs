*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;font-family:'Space Mono',monospace;font-size:12px;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

.zbtn:hover{border-color:#aaa;color:#ccc;}
#wrap{flex:1;position:relative;overflow:hidden;cursor:grab;background:#f5f5f5;}
#wrap.grabbing{cursor:grabbing;}
canvas{position:absolute;top:0;left:0;}
#card-layer{position:absolute;top:0;left:0;pointer-events:none;}
.node-card{
  position:absolute;
  pointer-events:auto;
  font-family:'Space Mono',monospace;
  font-size:11px;
  overflow:hidden;
  border-radius:5px;
}
.nc-inner{
  padding:14px 16px;
  height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.nc-toprow{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.nc-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;}
.nc-cost{font-size:10px;font-weight:700;}
.nc-title{font-size:14px;font-weight:700;line-height:1.25;}
.nc-divider{height:1px;flex-shrink:0;}
.nc-section-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.nc-desc{font-size:11px;line-height:1.7;}
.nc-tech{font-size:10px;line-height:1.65;}
.nc-stats{display:flex;gap:0;}
.nc-stat{flex:1;display:flex;flex-direction:column;gap:2px;}
.nc-stat-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.nc-stat-val{font-size:12px;font-weight:700;}
.nc-access{display:flex;gap:0;}

// Apply tier/col
NODES.forEach(n=>{ n.tier=NEW_TIER[n.id]||0; n.col=NEW_COL[n.id]||0; });
const NM={};
NODES.forEach(n=>NM[n.id]=n);

// ---
//  LAYOUT CONSTANTS
// ---
const MAX_TIER=Math.max(...NODES.map(n=>n.tier));
const MAX_COL =Math.max(...NODES.map(n=>n.col));
const NUM_TIERS=MAX_TIER+1;
const NUM_COLS =MAX_COL+1;

const BASE_W=114;  // normal node width
const BASE_H=154;   // normal node height (3 lines taller)
const EXP_W=380;   // expanded node width
const EXP_H=404;   // expanded node height (3 lines taller)
const GAP_X=12;    // horizontal gap between nodes
const GAP_Y=16;    // vertical gap between nodes
const PAD=40;      // canvas padding

// ── DYNAMIC LAYOUT ──
// colWidths[c] and tierHeights[t] vary based on selection
function getLayout(){
  const selTier = selNode ? selNode.tier : -1;
  const selCol  = selNode ? selNode.col  : -1;

  const colWidths=[], tierHeights=[];
  for(let c=0;c<NUM_COLS;c++){
    colWidths.push(c===selCol ? EXP_W : BASE_W);
  }
  for(let t=0;t<NUM_TIERS;t++){
    tierHeights.push(t===selTier ? EXP_H : BASE_H);
  }

  // x origin of each column
  const colX=[PAD];
  for(let c=1;c<NUM_COLS;c++) colX.push(colX[c-1]+colWidths[c-1]+GAP_X);

  // y origin of each tier
  const tierY=[PAD];
  for(let t=1;t<NUM_TIERS;t++) tierY.push(tierY[t-1]+tierHeights[t-1]+GAP_Y);

  const totalW=colX[NUM_COLS-1]+colWidths[NUM_COLS-1]+PAD;
  const totalH=tierY[NUM_TIERS-1]+tierHeights[NUM_TIERS-1]+PAD;

  return {colWidths,tierHeights,colX,tierY,totalW,totalH};
}

function nodeRect(n, layout){
  const {colX,tierY,colWidths,tierHeights}=layout;
  return {
    x:colX[n.col], y:tierY[n.tier],
    w:colWidths[n.col], h:tierHeights[n.tier]
  };
}
function nodeCX(n,L){ const r=nodeRect(n,L); return r.x+r.w/2; }
function nodeCY(n,L){ const r=nodeRect(n,L); return r.y+r.h/2; }

//  CANVAS SETUP

const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const DPR=window.devicePixelRatio||1;

let CP='dem', selNode=null;
let T={x:16,y:16,s:1};

function resizeCanvas(totalW,totalH){
  cv.width=totalW*DPR; cv.height=totalH*DPR;
  cv.style.width=totalW+'px'; cv.style.height=totalH+'px';
  ctx.scale(DPR,DPR);
}

// ---
//  ANCESTOR / DESCENDANT
// ---
function getAncestors(id){
  const visited=new Set();
  function walk(nid){ if(visited.has(nid))return; visited.add(nid); (NM[nid]?.prereqs||[]).forEach(walk); }
  walk(id); visited.delete(id); return visited;
}
function getDescendants(id){
  const visited=new Set();
  function walk(nid){ if(visited.has(nid))return; visited.add(nid); NODES.forEach(n=>{ if(n.prereqs.includes(nid)) walk(n.id); }); }
  NODES.forEach(n=>{ if(n.prereqs.includes(id)) walk(n.id); });
  return visited;
}

// ---
//  TEXT UTILITIES
// ---
function wrapText(text, maxW){
  const words=text.split(' ');
  const lines=[];
  let cur='';
  words.forEach(w=>{
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width<=maxW){ cur=test; }
    else { if(cur) lines.push(cur); cur=w; }
  });
  if(cur) lines.push(cur);
  return lines;
}

function drawTextBlock(lines, x, cx, y, lineH, color){
  ctx.fillStyle=color;
  lines.forEach((ln,i)=>ctx.fillText(ln,cx,y+i*lineH));
}

// ---
//  DRAW
// ---
function rrPath(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function draw(){
  const L=getLayout();
  const {totalW,totalH,colX,tierY,colWidths,tierHeights}=L;

  resizeCanvas(totalW,totalH);
  ctx.clearRect(0,0,totalW,totalH);
  ctx.fillStyle='#f5f5f5';
  ctx.fillRect(0,0,totalW,totalH);

  const ancestors  = selNode ? getAncestors(selNode.id)   : new Set();
  const descendants= selNode ? getDescendants(selNode.id) : new Set();

  // Tier band backgrounds
  for(let t=0;t<NUM_TIERS;t++){
    ctx.fillStyle=t%2===0?'#eeeeee':'#f9f9f9';
    ctx.fillRect(0, tierY[t]-GAP_Y/2, totalW, tierHeights[t]+GAP_Y);
  }

  // EDGES
  NODES.forEach(node=>{
    node.prereqs.forEach(pid=>{
      const par=NM[pid]; if(!par) return;
      const x1=nodeCX(par,L), y1=nodeRect(par,L).y+nodeRect(par,L).h;
      const x2=nodeCX(node,L), y2=nodeRect(node,L).y;
      const laneY=y1+(y2-y1)*0.45;

      let edgeCol='#cccccc', lw=0.8;
      if(selNode){
        const sid=selNode.id;
        if(pid===sid||node.id===sid)         {edgeCol='#000000';lw=2;}
        else if(ancestors.has(pid)&&ancestors.has(node.id)) {edgeCol='#444444';lw=1.5;}
        else if(descendants.has(pid)&&descendants.has(node.id)){edgeCol='#444444';lw=1.5;}
        else if(ancestors.has(node.id)||ancestors.has(pid))  {edgeCol='#888888';lw=1;}
        else if(descendants.has(node.id)||descendants.has(pid)){edgeCol='#888888';lw=1;}
        else {edgeCol='#dddddd';lw=0.5;}
      }

      ctx.strokeStyle=edgeCol; ctx.lineWidth=lw; ctx.lineJoin='round';
      ctx.beginPath();
      ctx.moveTo(x1,y1+1);
      if(Math.abs(x1-x2)<2){ ctx.lineTo(x2,y2-1); }
      else { ctx.lineTo(x1,laneY); ctx.lineTo(x2,laneY); ctx.lineTo(x2,y2-1); }
      ctx.stroke();

      ctx.fillStyle=edgeCol;
      ctx.beginPath();
      ctx.moveTo(x2-3.5,y2-1); ctx.lineTo(x2+3.5,y2-1); ctx.lineTo(x2,y2+6);
      ctx.closePath(); ctx.fill();
    });
  });

  // NODES
  NODES.forEach(node=>{
    const {x,y,w,h}=nodeRect(node,L);
    const isSel  = selNode&&selNode.id===node.id;
    const isAnc  = selNode&&ancestors.has(node.id);
    const isDesc = selNode&&descendants.has(node.id);
    const isDim  = selNode&&!isSel&&!isAnc&&!isDesc;
    const isNoacc= node.access[CP]==='no';

    const dom=DOM_META[node.domain];

    let bgFill, borderCol, borderW, textCol;
    if(isSel){
      bgFill='#111111'; borderCol='#111111'; borderW=0; textCol=dom.bg;
    } else if(isNoacc){
      bgFill='#eeeeee'; borderCol='#cccccc'; borderW=0.75; textCol='#aaaaaa';
    } else if(isDim){
      bgFill='#f5f5f5'; borderCol='#dddddd'; borderW=0.5; textCol='#bbbbbb';
    } else {
      bgFill=dom.bg; borderCol=isAnc||isDesc?'#000000':'#888888'; borderW=isAnc||isDesc?2:1; textCol='#000000';
    }

    // Box
    rrPath(x,y,w,h,5);
    ctx.fillStyle=bgFill; ctx.fill();
    if(borderW>0){ ctx.strokeStyle=borderCol; ctx.lineWidth=borderW; ctx.stroke(); }

    // Label — all nodes including selected (selected shows empty/placeholder; DOM card overlays it)
    if(!isSel){
      ctx.textAlign='center';
      ctx.font='400 11px "Space Mono",monospace';
      ctx.fillStyle=textCol;
      const labelMaxW=w-12;
      const rawLines=node.label.split('\n');
      const wrapped=[];
      rawLines.forEach(raw=>{
        if(ctx.measureText(raw).width<=labelMaxW){ wrapped.push(raw); }
        else {
          const words=raw.split(' '); let cur='';
          words.forEach(ww=>{ const t2=cur?cur+' '+ww:ww; if(ctx.measureText(t2).width<=labelMaxW)cur=t2; else{if(cur)wrapped.push(cur);cur=ww;} });
          if(cur) wrapped.push(cur);
        }
      });
      const lh=14, th=(wrapped.length-1)*lh;
      const sy=y+h/2-th/2+4;
      wrapped.forEach((ln,i)=>ctx.fillText(ln,x+w/2,sy+i*lh));
    }
  });
}

  techText.className='nc-tech'; techText.textContent=selNode.tech;
  techText.style.color=C+'bb';
  techWrap.appendChild(techLabel); techWrap.appendChild(techText);
  inner.appendChild(techWrap);

  // Divider
  const div2=document.createElement('div');
  div2.className='nc-divider'; div2.style.background=C+'33';
  inner.appendChild(div2);

  // Stat effects
  const statWrap=document.createElement('div');
  const statLabel=document.createElement('div');
  statLabel.className='nc-section-label';
  statLabel.textContent='Stat Effects — '+PL_LABELS[CP];
  statLabel.style.color=C+'88';
  statWrap.appendChild(statLabel);
  const statsRow=document.createElement('div');
  statsRow.className='nc-stats';
  statKeys.forEach(k=>{
    const v=fx[k];
    const valCol=v>0?Cd:v<0?'#cc4444':'#888888';
    const s=document.createElement('div'); s.className='nc-stat';
    const sl=document.createElement('div'); sl.className='nc-stat-label';
    sl.textContent=statLabels[k]; sl.style.color=C+'77';
    const sv=document.createElement('div'); sv.className='nc-stat-val';
    sv.textContent=(v>0?'+':'')+v; sv.style.color=valCol;
    s.appendChild(sl); s.appendChild(sv);
    statsRow.appendChild(s);
  });
  statWrap.appendChild(statsRow);
  inner.appendChild(statWrap);

  // Polity access
  const accWrap=document.createElement('div');
  const accLabel=document.createElement('div');
  accLabel.className='nc-section-label'; accLabel.textContent='Polity Access';
  accLabel.style.color=C+'88';
  accWrap.appendChild(accLabel);
  const accRow=document.createElement('div');
  accRow.className='nc-access';
  ['dem','auth','corp','ns'].forEach(p=>{
    const a=selNode.access[p];
    const col=a==='yes'?Cd:a==='partial'?'#997700':'#666666';
    const ac=document.createElement('div'); ac.className='nc-acc';
    const al=document.createElement('div'); al.className='nc-acc-label';
    al.textContent=PL_LABELS[p].substring(0,4).toUpperCase(); al.style.color=C+'77';
    const av=document.createElement('div'); av.className='nc-acc-val';
    av.textContent=a==='yes'?'Yes':a==='partial'?'~':'No'; av.style.color=col;
    ac.appendChild(al); ac.appendChild(av);
    accRow.appendChild(ac);
  });
  accWrap.appendChild(accRow);
  inner.appendChild(accWrap);

  cl.appendChild(card);
}
function fitView(){
  const L=getLayout();
  const vw=wrap.clientWidth,vh=wrap.clientHeight;
  T.s=Math.min(vw/L.totalW,vh/L.totalH)*0.93;
  T.x=(vw-L.totalW*T.s)/2; T.y=(vh-L.totalH*T.s)/2;
  applyT();
}

wrap.addEventListener('mousedown',e=>{ if(e.button!==0)return; drag=true; ds={x:e.clientX,y:e.clientY}; ts={x:T.x,y:T.y}; wrap.classList.add('grabbing'); });
window.addEventListener('mousemove',e=>{ if(!drag)return; T.x=ts.x+(e.clientX-ds.x); T.y=ts.y+(e.clientY-ds.y); applyT(); });
window.addEventListener('mouseup',()=>{ drag=false; wrap.classList.remove('grabbing'); });
wrap.addEventListener('wheel',e=>{ e.preventDefault(); const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top; const d=e.deltaY>0?0.88:1.14; const ns=Math.min(Math.max(T.s*d,0.12),4); T.x=mx-(mx-T.x)*(ns/T.s); T.y=my-(my-T.y)*(ns/T.s); T.s=ns; applyT(); },{passive:false});
document.getElementById('zi').onclick=()=>{T.s=Math.min(T.s*1.25,4);applyT();};
document.getElementById('zo').onclick=()=>{T.s=Math.max(T.s*0.8,0.25);applyT();};
document.getElementById('zr').onclick=()=>{ fitView(); };

// ---
//  CLICK
// ---
wrap.addEventListener('click',e=>{
  if(Math.abs(e.clientX-ds.x)>5||Math.abs(e.clientY-ds.y)>5)return;
  const r=wrap.getBoundingClientRect();
  const wx=(e.clientX-r.left-T.x)/T.s, wy=(e.clientY-r.top-T.y)/T.s;
  const L=getLayout();
  let hit=null;
  NODES.forEach(n=>{ const {x,y,w,h}=nodeRect(n,L); if(wx>=x&&wx<=x+w&&wy>=y&&wy<=y+h) hit=n; });
  selNode=(hit&&selNode&&hit.id===selNode.id)?null:hit;
  draw(); updateCard();
});

// ---
//  POLITY SWITCH
// ---
function setPolity(p){
  CP=p;
  document.querySelectorAll('.ppill').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.ppill[data-p="${p}"]`).classList.add('active');
  draw(); updateCard();
}
window.setPolity=setPolity;

window.addEventListener('load',()=>{ draw(); updateCard(); applyT(); });
window.addEventListener('resize',()=>{ draw(); updateCard(); });
</script>
</body>
